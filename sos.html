<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergencia SOS</title>

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="app">

   
    <header class="rojo">

        <a href="index.html">←</a>

        <div>
            <h2>🚨 Emergencia SOS</h2>
            <p>Centro de ayuda inmediata</p>
        </div>

    </header>

    
    <section class="contenido">

        
        <div class="sos-card">

            <div class="icono">🚨</div>

            <h1>¿Necesitas ayuda?</h1>

            <p>
                Completa el reporte y enviaremos la información
                a tus contactos de emergencia.
            </p>

            <div class="estado-sos">
                🟢 GPS preparado
                <br>
                📡 Sistema conectado
            </div>

        </div>

        
        <div class="reporte-card">

            <h2>📝 Reportar incidente</h2>

            <form id="reporte">

                <label for="lugar">Lugar del evento</label>

                <input
                    id="lugar"
                    type="text"
                    placeholder="Ejemplo: Av. Santa Clara"
                    required
                >

                <label for="tipo">Tipo de incidente</label>

                <input
                    id="tipo"
                    type="text"
                    placeholder="Robo, accidente, peligro..."
                    required
                >

                <label for="descripcion">Descripción</label>

                <textarea
                    id="descripcion"
                    placeholder="Describe lo ocurrido..."
                    required
                ></textarea>

                <button type="submit" class="btn">
                    Enviar reporte
                </button>

            </form>

        </div>

    </section>

   
    <nav>

        <a href="index.html">Inicio</a>

        <a href="sos.html">SOS</a>

        <a href="ubicacion.html">Mapa</a>

        <a href="alertas.html">Alertas</a>

    </nav>

</div>

<script src="app.js"></script>

</body>
</html>
